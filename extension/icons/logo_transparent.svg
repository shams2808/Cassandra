<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Glowing Coral Slash -->
  <path d="M44 94 L68 34" stroke="#ff5f7e" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
  <!-- White Letter C -->
  <text x="68" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif" font-size="62" font-weight="900" fill="#ffffff">c</text>
</svg>
